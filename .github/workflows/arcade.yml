name: generate pacman game

on:
  schedule: # run automatically every 24 hours
    - cron: "0 */24 * * *"
  workflow_dispatch: # allows to manually run the job at any time
  push: # run on every push on the main branch
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: generate pacman contribution graphs
        run: |
          mkdir -p dist
          npx pacman-contribution-graph --platform github --username ahmadsanny02 --gameTheme github --game pacman --output dist/pacman-contribution-graph.svg
          npx pacman-contribution-graph --platform github --username ahmadsanny02 --gameTheme github-dark --game pacman --output dist/pacman-contribution-graph-dark.svg

      # push the content of <build_dir> to a branch
      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}